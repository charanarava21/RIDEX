<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Activity - RIDEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #151518;
            --accent-purple: #8b5cf6;
            --accent-emerald: #10b981;
            --accent-blue: #3b82f6;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .glass-nav {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .activity-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
        }

        .activity-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }

        .type-pill {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .type-published { background: rgba(139, 92, 246, 0.1); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.2); }
        .type-booked { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .type-courier { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 12px;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav fixed top-0 w-full z-50 px-6 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-bold text-white">R</div>
            <span class="text-xl font-bold text-white">RIDEX</span>
        </a>
        <div class="flex items-center gap-6 text-sm">
            <a href="index.html" class="text-gray-400 hover:text-white transition-colors">Home</a>
            <a href="book.html" class="text-gray-400 hover:text-white transition-colors">Find Ride</a>
            <a href="profile.html">
            <div class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-user text-xs"></i>
            </div>
            </a>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-5xl mx-auto">
        <div class="mb-10">
            <h1 class="text-4xl font-extrabold mb-2">My Activity</h1>
            <p class="text-gray-500">Track your published rides and confirmed bookings.</p>
        </div>

        <!-- Filters Section -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 bg-white/5 p-4 rounded-3xl border border-white/5">
            <div class="flex flex-wrap gap-2">
                <button class="tab-btn active category-filter" onclick="window.filterBy('all', this)">All Activity</button>
                <button class="tab-btn category-filter" onclick="window.filterBy('published', this)">Published</button>
                <button class="tab-btn category-filter" onclick="window.filterBy('booked', this)">Booked</button>
            </div>
            
            <div class="flex gap-4 items-center">
                <span id="activity-count" class="text-xs font-bold text-gray-500 uppercase tracking-widest">0 Items</span>
            </div>
        </div>

        <div class="space-y-4" id="activityContainer">
            <!-- Data will be injected here -->
            <div class="p-20 text-center animate-pulse">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-violet-500"></i>
                <p class="mt-4 text-gray-500">Syncing your activity...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6">
                <i class="fa-solid fa-folder-open text-3xl text-gray-700"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">No records found</h3>
            <p class="text-gray-500 max-w-xs">You haven't published or booked any rides yet.</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCd_ydWcFyr8sEmnzF9hQPobLkFMXkeyso",
            authDomain: "ridex-74948.firebaseapp.com",
            projectId: "ridex-74948",
            storageBucket: "ridex-74948.firebasestorage.app",
            messagingSenderId: "722829487082",
            appId: "1:722829487082:web:c80538bcd04601fc3d2093"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const activityContainer = document.getElementById("activityContainer");
        const emptyState = document.getElementById("emptyState");
        const countDisplay = document.getElementById("activity-count");

        let allData = [];
        let currentFilter = 'all';

        // Listen to BOTH published rides and bookings
        function setupRealtimeListeners() {
            // 1. Get Published Rides
            onSnapshot(query(collection(db, "rides"), orderBy("createdAt", "desc")), (snap) => {
                const rides = snap.docs.map(doc => ({ ...doc.data(), id: doc.id, type: 'published' }));
                
                // 2. Get Bookings
                onSnapshot(query(collection(db, "bookings"), orderBy("createdAt", "desc")), (bookSnap) => {
                    const bookings = bookSnap.docs.map(doc => ({ ...doc.data(), id: doc.id, type: 'booked' }));
                    
                    // Merge and Sort by date
                    allData = [...rides, ...bookings].sort((a, b) => {
                        const dateA = a.createdAt?.seconds || 0;
                        const dateB = b.createdAt?.seconds || 0;
                        return dateB - dateA;
                    });

                    renderActivity();
                });
            });
        }

        function renderActivity() {
            const filtered = allData.filter(item => currentFilter === 'all' || item.type === currentFilter);
            
            activityContainer.innerHTML = "";
            countDisplay.innerText = `${filtered.length} Items`;

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            filtered.forEach(item => {
                const card = document.createElement("div");
                card.className = "activity-card flex flex-col md:flex-row gap-6";
                
                if (item.type === "published") {
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="type-pill type-published">Published by you</span>
                                <span class="text-xs text-gray-500"><span class="status-dot bg-amber-500"></span>Active • ${item.seats || 0} Seats left</span>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="flex-1">
                                    <div class="text-xs text-gray-500 uppercase font-bold mb-1">Route</div>
                                    <div class="flex items-center gap-3 font-bold text-lg">
                                        ${item.from} <i class="fa-solid fa-arrow-right text-sm text-gray-600"></i> ${item.to}
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-gray-500 uppercase font-bold mb-1">Departure</div>
                                    <div class="font-bold">${item.date || 'TBA'}, ${item.time || ''}</div>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center justify-end gap-3 md:border-l border-white/5 md:pl-6">
                            <button class="px-6 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-sm font-bold transition-colors">Manage</button>
                        </div>
                    `;
                } else if (item.type === "booked") {
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="type-pill type-booked">Booked Ride</span>
                                <span class="text-xs text-gray-500"><span class="status-dot bg-emerald-500"></span>Confirmed</span>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="flex-1">
                                    <div class="text-xs text-gray-500 uppercase font-bold mb-1">Route</div>
                                    <div class="flex items-center gap-3 font-bold text-lg">
                                        ${item.from} <i class="fa-solid fa-arrow-right text-sm text-gray-600"></i> ${item.to}
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-gray-500 uppercase font-bold mb-1">Booking ID</div>
                                    <div class="font-bold font-mono text-violet-400 text-sm">${item.bookingId || '#RDX-TEMP'}</div>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center justify-end gap-3 md:border-l border-white/5 md:pl-6">
                            <div class="text-right mr-4">
                                <div class="text-[10px] text-gray-500 uppercase font-bold">Paid</div>
                                <div class="font-bold text-white text-sm">₹${item.total || 0}</div>
                            </div>
                            <button class="px-6 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-sm font-bold transition-colors">Details</button>
                        </div>
                    `;
                }
                activityContainer.appendChild(card);
            });
        }

        window.filterBy = (val, el) => {
            currentFilter = val;
            document.querySelectorAll('.category-filter').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderActivity();
        };

        setupRealtimeListeners();
    </script>
</body>
</html>
