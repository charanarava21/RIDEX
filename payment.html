<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridex | Secure Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
input:focus{outline:none;border-color:#3b82f6}
#loading-overlay{display:none;backdrop-filter:blur(4px)}
.vpa-input:invalid{border-color:#ef4444}
</style>
</head>

<body class="bg-gray-50 font-sans text-gray-900">

<div class="max-w-4xl mx-auto px-4 py-8">

<!-- HEADER -->
<div class="flex items-center justify-between mb-8">
<div class="flex items-center space-x-2">
<div class="bg-blue-600 p-2 rounded-lg">
<i class="fas fa-car text-white text-xl"></i>
</div>
<h1 class="text-2xl font-bold tracking-tight">RIDEX</h1>
</div>
<div class="text-sm text-gray-500">
<i class="fas fa-lock mr-1"></i> Secure Encryption Enabled
</div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

<!-- LEFT -->
<div class="lg:col-span-2 space-y-6">

<div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">

<div class="p-6 border-b border-gray-100">
<h2 class="text-lg font-semibold">Select Payment Method</h2>
</div>

<div class="grid grid-cols-3 divide-x divide-gray-100">
<button onclick="switchTab('wallet')" id="tab-wallet" class="py-4 flex flex-col items-center space-y-2 bg-blue-50 border-b-2 border-blue-600">
<i class="fas fa-wallet text-blue-600"></i>
<span class="text-xs font-medium">Ridex Wallet</span>
</button>

<button onclick="switchTab('upi')" id="tab-upi" class="py-4 flex flex-col items-center space-y-2">
<i class="fas fa-mobile-alt text-gray-400"></i>
<span class="text-xs font-medium">UPI Pay</span>
</button>

<button onclick="switchTab('netbanking')" id="tab-netbanking" class="py-4 flex flex-col items-center space-y-2">
<i class="fas fa-university text-gray-400"></i>
<span class="text-xs font-medium">Net Banking</span>
</button>
</div>

<!-- WALLET -->
<div id="form-wallet" class="p-6 space-y-4">
<div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex justify-between">
<div>
<p class="text-xs text-blue-600 font-bold uppercase">Available Balance</p>
<p class="text-2xl font-black text-blue-900">₹1,240.00</p>
</div>
</div>

<div class="flex items-center space-x-2 text-sm text-gray-600">
<input type="checkbox" checked>
<label id="wallet-deduct-label">Deduct from wallet</label>
</div>
</div>

<!-- UPI -->
<div id="form-upi" class="p-6 space-y-4 hidden">
<label class="text-xs font-bold text-gray-500 uppercase">Enter VPA / UPI ID</label>
<input type="text" id="upiId" placeholder="example@upi" class="vpa-input w-full p-3 border rounded-lg">

<div class="pt-4 border-t">
<p class="text-xs font-bold text-gray-500 uppercase mb-3">Or Pay via App</p>
<div class="grid grid-cols-4 gap-4">
<div class="grid grid-cols-4 gap-4">

<button onclick="triggerUPIApp('gpay')" class="flex flex-col items-center space-y-1">
<div class="w-12 h-12 border rounded-xl flex items-center justify-center hover:border-blue-500">
<i class="fab fa-google-pay text-2xl"></i>
</div>
<span class="text-[10px]">GPay</span>
</button>

<button onclick="triggerUPIApp('phonepe')" class="flex flex-col items-center space-y-1">
<div class="w-12 h-12 border rounded-xl flex items-center justify-center text-purple-600">
<i class="fas fa-mobile-screen-button text-2xl"></i>
</div>
<span class="text-[10px]">PhonePe</span>
</button>

<button onclick="triggerUPIApp('paytm')" class="flex flex-col items-center space-y-1">
<div class="w-12 h-12 border rounded-xl flex items-center justify-center text-blue-500">
<i class="fas fa-wallet text-2xl"></i>
</div>
<span class="text-[10px]">Paytm</span>
</button>

<button onclick="triggerUPIApp('amazon')" class="flex flex-col items-center space-y-1">
<div class="w-12 h-12 border rounded-xl flex items-center justify-center text-orange-500">
<i class="fab fa-amazon text-2xl"></i>
</div>
<span class="text-[10px]">Amazon</span>
</button>

</div>
</div>
</div>
</div>

<!-- NETBANKING -->
<div id="form-netbanking" class="p-6 hidden">
<select class="w-full p-3 border rounded-lg">
<option>Choose Bank</option>
<option>SBI</option>
<option>HDFC</option>
<option>ICICI</option>
</select>
</div>

</div>

<button onclick="handlePayment()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">
Confirm & Pay ₹<span id="btn-amount">0.00</span>
</button>

</div>

<!-- RIGHT SUMMARY -->
<div>
<div class="bg-white rounded-2xl shadow-sm border p-6 sticky top-8">
<h2 class="text-lg font-semibold mb-4">Ride Details</h2>

<div class="flex justify-between mb-4">
<span class="text-gray-500">Amount Payable</span>
<span id="summary-amount" class="text-2xl font-black text-blue-600">₹0.00</span>
</div>

</div>
</div>

</div>
</div>

<!-- SUCCESS MODAL -->
<div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
<div id="status-card" class="bg-white rounded-3xl p-8 text-center">
<div id="loader-content">
<div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mx-auto mb-6"></div>
<h3 class="text-xl font-bold">Processing Payment...</h3>
</div>

<div id="success-content" class="hidden">
<div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
<i class="fas fa-check text-4xl text-green-500"></i>
</div>
<h3 class="text-2xl font-bold mb-2">Payment Successful!</h3>
<p id="success-text" class="text-gray-500 text-sm mb-6"></p>
<button onclick="window.location.href='book.html'" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Continue</button>
</div>

</div>
</div>

<script>

// ===== GET AMOUNT FROM URL =====
const params = new URLSearchParams(window.location.search);
let amount = parseFloat(params.get("amount")) || 0;

if (!amount || amount <= 0) {
    alert("Invalid payment request");
    window.location.href = "publish.html";
}

amount = amount.toFixed(2);

// Update UI
document.getElementById("btn-amount").innerText = amount;
document.getElementById("summary-amount").innerText = "₹" + amount;
document.getElementById("wallet-deduct-label").innerText =
    "Deduct ₹" + amount + " from my Ridex Wallet";


// ===== UPI REDIRECT FUNCTION =====
function triggerUPIApp(appName) {

    const merchantUPI = "9398827427@ptaxis";
    const merchantName = "RIDEX";
    const note = "Ride Security Deposit";

    const upiLink =
        `upi://pay?pa=${merchantUPI}` +
        `&pn=${encodeURIComponent(merchantName)}` +
        `&am=${amount}` +
        `&cu=INR` +
        `&tn=${encodeURIComponent(note)}`;

    // Direct redirect to UPI app
    window.location.href = upiLink;
}
// ===== HANDLE PAYMENT (SIMULATION) =====
function handlePayment() {

    document.getElementById("loading-overlay").style.display = "flex";

    setTimeout(() => {

        document.getElementById("loader-content").classList.add("hidden");
        document.getElementById("success-content").classList.remove("hidden");

        document.getElementById("success-text").innerText =
            "Payment of ₹" + amount + " received successfully.";

    }, 3000);
}

</script>

</body>
</html>
